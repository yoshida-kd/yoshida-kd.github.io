<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>予定管理</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- FullCalendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f8f9fa;
    }
    footer { margin-top: auto; }

    /* Event badges */
    .fc-event-open {
      background-color: #198754 !important;
      border-color: #198754 !important;
    }
    .fc-event-closed {
      background-color: #6c757d !important;
      border-color: #6c757d !important;
    }

    #calendar {
      max-width: 900px;
      margin: 0 auto;
    }

    .legend-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    #pageContent {
      visibility: hidden;
      pointer-events: none;
    }

    #pageContent.is-unlocked {
      visibility: visible;
      pointer-events: auto;
    }

    #authGate {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(248, 249, 250, 0.92);
      backdrop-filter: blur(10px);
    }

    #authGate.is-hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div id="authGate" aria-modal="true" role="dialog" aria-labelledby="authGateTitle">
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 420px; width: 100%;">
      <div class="card-body p-4 p-md-5">
        <h1 class="h4 fw-bold mb-2" id="authGateTitle">
          <i class="bi bi-lock me-2"></i>予定管理ページ
        </h1>
        <p class="text-muted mb-4" id="authGateDescription">パスワードを入力してください。</p>

        <div id="authSetupFields" class="d-none">
          <div class="mb-3">
            <label class="form-label fw-semibold" for="authSetupPassword1">新しいパスワード</label>
            <input type="password" id="authSetupPassword1" class="form-control" placeholder="パスワードを入力" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="authSetupPassword2">パスワード（確認）</label>
            <input type="password" id="authSetupPassword2" class="form-control" placeholder="もう一度入力" />
          </div>
        </div>

        <div id="authLoginFields">
          <label class="form-label fw-semibold" for="authPassword">パスワード</label>
          <input type="password" id="authPassword" class="form-control" placeholder="パスワードを入力" />
        </div>

        <div id="authError" class="text-danger small d-none mt-3"></div>
        <button type="button" id="authSubmit" class="btn btn-primary w-100 mt-4">
          <i class="bi bi-unlock me-1"></i><span id="authSubmitLabel">ログイン</span>
        </button>
      </div>
    </div>
  </div>

  <div id="pageContent">
    <!-- Navbar -->
    <nav class="navbar navbar-light bg-white">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          <i class="bi bi-shop me-2"></i>コーヒーブレイク
        </a>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-dark btn-sm" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
            <i class="bi bi-key me-1"></i>パスワード変更
          </button>
          <a href="schedule.html" class="btn btn-success btn-sm">
            <i class="bi bi-calendar3 me-1"></i>予定管理
          </a>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <main class="flex-grow-1 container py-4">
      <h2 class="mb-1 fw-bold"><i class="bi bi-calendar-week me-2"></i>予定管理</h2>
      <p class="text-muted mb-3">日付をクリックして「営業日（デフォルト）」か「臨時休業」を切り替えられます。</p>

      <!-- Legend -->
      <div class="d-flex gap-3 mb-3 align-items-center">
        <span class="d-flex align-items-center gap-1">
          <span class="legend-dot bg-success"></span> 営業日（デフォルト）
        </span>
        <span class="d-flex align-items-center gap-1">
          <span class="legend-dot bg-secondary"></span> 臨時休業
        </span>
        <button id="btnClearAll" class="btn btn-outline-danger btn-sm ms-auto">
          <i class="bi bi-trash me-1"></i>すべてリセット
        </button>
      </div>

      <!-- Calendar -->
      <div id="calendar"></div>

      <!-- Bulk set modal trigger -->
      <div class="mt-3 d-flex gap-2 flex-wrap">
        <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#bulkModal">
          <i class="bi bi-calendar-plus me-1"></i>まとめて登録
        </button>
      </div>
    </main>

    <!-- Bulk modal -->
    <div class="modal fade" id="bulkModal" tabindex="-1" aria-labelledby="bulkModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="bulkModalLabel">
              <i class="bi bi-calendar-range me-2"></i>まとめて登録
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label fw-semibold">開始日</label>
              <input type="date" id="bulkStart" class="form-control" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">終了日</label>
              <input type="date" id="bulkEnd" class="form-control" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">ステータス</label>
              <select id="bulkStatus" class="form-select">
                <option value="open">営業中</option>
                <option value="closed">準備中（削除）</option>
              </select>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="weekdaysOnly" />
              <label class="form-check-label" for="weekdaysOnly">平日のみ（土日を除く）</label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
            <button type="button" class="btn btn-success" id="btnBulkSave" data-bs-dismiss="modal">
              <i class="bi bi-check2 me-1"></i>登録
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Password change modal -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="changePasswordModalLabel">
              <i class="bi bi-key me-2"></i>パスワード変更
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label fw-semibold">現在のパスワード</label>
              <input type="password" id="changeCurrentPassword" class="form-control" placeholder="現在のパスワード" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">新しいパスワード</label>
              <input type="password" id="changeNewPassword1" class="form-control" placeholder="新しいパスワード" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">新しいパスワード（確認）</label>
              <input type="password" id="changeNewPassword2" class="form-control" placeholder="もう一度入力" />
            </div>
            <div id="changePasswordError" class="text-danger small d-none"></div>
            <div id="changePasswordSuccess" class="text-success small d-none"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
            <button type="button" class="btn btn-primary" id="btnChangePasswordSave">
              <i class="bi bi-check2 me-1"></i>変更する
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="py-3 bg-white text-dark text-center small border-top mt-4">
      <div class="container">
        &copy; <span id="year"></span> yoshida-kd
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    /* ---- password helpers ---- */
    const PW_KEY = 'schedulePasswordHash';

    async function sha256(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    /* ---- PBKDF2 helpers (salted key derivation) ---- */
    async function hashPassword(password) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const key = await deriveKey(password, salt);
      const saltHex = Array.from(salt).map(b => b.toString(16).padStart(2, '0')).join('');
      return saltHex + ':' + key;
    }

    async function deriveKey(password, salt) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
      const bits = await crypto.subtle.deriveBits(
        { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
        keyMaterial, 256
      );
      return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function verifyPassword(password, stored) {
      const [saltHex, expectedKey] = stored.split(':');
      if (!saltHex || !expectedKey) {
        /* legacy SHA-256 (no salt) — accept once, will be re-hashed on next change */
        return await sha256(password) === stored;
      }
      const salt = new Uint8Array(saltHex.match(/.{2}/g).map(h => parseInt(h, 16)));
      const key = await deriveKey(password, salt);
      return key === expectedKey;
    }

    const MIN_PW_LEN = 8;
    const pageContent = document.getElementById('pageContent');
    const authGate = document.getElementById('authGate');
    const authGateDescription = document.getElementById('authGateDescription');
    const authSetupFields = document.getElementById('authSetupFields');
    const authLoginFields = document.getElementById('authLoginFields');
    const authSubmit = document.getElementById('authSubmit');
    const authSubmitLabel = document.getElementById('authSubmitLabel');
    const authError = document.getElementById('authError');
    const authPassword = document.getElementById('authPassword');
    const authSetupPassword1 = document.getElementById('authSetupPassword1');
    const authSetupPassword2 = document.getElementById('authSetupPassword2');
    let authMode = 'login';

    function showError(el, msg) {
      el.textContent = msg;
      el.classList.remove('d-none');
    }
    function hideError(el) {
      el.classList.add('d-none');
    }

    function setAuthMode(mode) {
      authMode = mode;
      const isSetup = mode === 'setup';
      authSetupFields.classList.toggle('d-none', !isSetup);
      authLoginFields.classList.toggle('d-none', isSetup);
      authGateDescription.textContent = isSetup
        ? '最初のパスワードを設定してください。'
        : 'パスワードを入力してください。';
      authSubmitLabel.textContent = isSetup ? '設定して開く' : 'ログイン';
      hideError(authError);
    }

    function unlockPage() {
      pageContent.classList.add('is-unlocked');
      authGate.classList.add('is-hidden');
    }

    window.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem(PW_KEY);
      if (!stored) {
        setAuthMode('setup');
      } else {
        setAuthMode('login');
      }
    });

    authSubmit.addEventListener('click', async () => {
      hideError(authError);

      if (authMode === 'setup') {
        const firstPassword = authSetupPassword1.value;
        const secondPassword = authSetupPassword2.value;
        if (!firstPassword) { showError(authError, 'パスワードを入力してください。'); return; }
        if (firstPassword.length < MIN_PW_LEN) { showError(authError, `パスワードは${MIN_PW_LEN}文字以上にしてください。`); return; }
        if (firstPassword !== secondPassword) { showError(authError, 'パスワードが一致しません。'); return; }
        localStorage.setItem(PW_KEY, await hashPassword(firstPassword));
        authPassword.value = '';
        authSetupPassword1.value = '';
        authSetupPassword2.value = '';
        unlockPage();
        return;
      }

      const password = authPassword.value;
      if (!password) { showError(authError, 'パスワードを入力してください。'); return; }
      const ok = await verifyPassword(password, localStorage.getItem(PW_KEY));
      if (!ok) {
        showError(authError, 'パスワードが違います。');
        authPassword.value = '';
        return;
      }
      authPassword.value = '';
      unlockPage();
    });

    [authPassword, authSetupPassword1, authSetupPassword2].forEach(input => {
      input.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          authSubmit.click();
        }
      });
    });

    /* ---- change password ---- */
    document.getElementById('btnChangePasswordSave').addEventListener('click', async () => {
      const cur = document.getElementById('changeCurrentPassword').value;
      const n1 = document.getElementById('changeNewPassword1').value;
      const n2 = document.getElementById('changeNewPassword2').value;
      const errEl = document.getElementById('changePasswordError');
      const okEl = document.getElementById('changePasswordSuccess');
      hideError(errEl);
      okEl.classList.add('d-none');
      if (!cur) { showError(errEl, '現在のパスワードを入力してください。'); return; }
      const curOk = await verifyPassword(cur, localStorage.getItem(PW_KEY));
      if (!curOk) {
        showError(errEl, '現在のパスワードが違います。');
        document.getElementById('changeCurrentPassword').value = '';
        return;
      }
      if (!n1) { showError(errEl, '新しいパスワードを入力してください。'); return; }
      if (n1.length < MIN_PW_LEN) { showError(errEl, `新しいパスワードは${MIN_PW_LEN}文字以上にしてください。`); return; }
      if (n1 !== n2) { showError(errEl, '新しいパスワードが一致しません。'); return; }
      localStorage.setItem(PW_KEY, await hashPassword(n1));
      document.getElementById('changeCurrentPassword').value = '';
      document.getElementById('changeNewPassword1').value = '';
      document.getElementById('changeNewPassword2').value = '';
      okEl.textContent = 'パスワードを変更しました。';
      okEl.classList.remove('d-none');
    });

    /* ---- storage helpers ---- */
    function getSchedule() {
      try { return JSON.parse(localStorage.getItem('schedule') || '{}'); }
      catch { return {}; }
    }
    function saveSchedule(s) {
      localStorage.setItem('schedule', JSON.stringify(s));
    }

    /* ---- build FullCalendar events from schedule ---- */
    function buildEvents(schedule, start, end) {
      const events = [];
      const cur = new Date(start);
      const last = new Date(end);

      while (cur < last) {
        const key = cur.toLocaleDateString('sv-SE');
        const isClosed = schedule[key] === 'closed';
        events.push({
          id: key,
          title: isClosed ? '臨時休業' : '営業日',
          start: key,
          allDay: true,
          classNames: [isClosed ? 'fc-event-closed' : 'fc-event-open'],
        });
        cur.setDate(cur.getDate() + 1);
      }

      return events;
    }

    /* ---- calendar ---- */
    const calEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calEl, {
      initialView: 'dayGridMonth',
      locale: 'ja',
      height: 'auto',
      firstDay: 0,
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,listMonth',
      },
      buttonText: { today: '今日', month: '月', list: 'リスト' },
      events(info, successCallback) {
        successCallback(buildEvents(getSchedule(), info.start, info.end));
      },

      /* Toggle on day click */
      dateClick(info) {
        const schedule = getSchedule();
        const key = info.dateStr;
        if (schedule[key] === 'closed') {
          delete schedule[key];
        } else {
          schedule[key] = 'closed';
        }
        saveSchedule(schedule);
        refreshCalendar();
      },

      /* Toggle on event click */
      eventClick(info) {
        const schedule = getSchedule();
        const key = info.event.id;
        if (schedule[key] === 'closed') {
          delete schedule[key];
        } else {
          schedule[key] = 'closed';
        }
        saveSchedule(schedule);
        refreshCalendar();
      },

    });
    calendar.render();

    function refreshCalendar() {
      calendar.refetchEvents();
    }

    /* ---- clear all ---- */
    document.getElementById('btnClearAll').addEventListener('click', () => {
      if (confirm('すべての予定をリセットしますか？')) {
        saveSchedule({});
        refreshCalendar();
      }
    });

    /* ---- bulk register ---- */
    document.getElementById('btnBulkSave').addEventListener('click', () => {
      const start = document.getElementById('bulkStart').value;
      const end = document.getElementById('bulkEnd').value;
      const status = document.getElementById('bulkStatus').value;
      const weekdaysOnly = document.getElementById('weekdaysOnly').checked;

      if (!start || !end || start > end) {
        alert('正しい日付範囲を入力してください。');
        return;
      }

      const schedule = getSchedule();
      const cur = new Date(start);
      const last = new Date(end);
      while (cur <= last) {
        const dow = cur.getDay();
        if (!weekdaysOnly || (dow !== 0 && dow !== 6)) {
          const key = cur.toLocaleDateString('sv-SE');
          if (status === 'open') {
            delete schedule[key];
          } else {
            schedule[key] = 'closed';
          }
        }
        cur.setDate(cur.getDate() + 1);
      }
      saveSchedule(schedule);
      refreshCalendar();
    });
  </script>
</body>
</html>
