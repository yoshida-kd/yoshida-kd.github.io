<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>予定管理</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- FullCalendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f8f9fa;
    }
    footer { margin-top: auto; }

    /* Calendar cell coloring */
    .fc-daygrid-day.day-open .fc-daygrid-day-frame {
      background: rgba(25, 135, 84, 0.15);
    }
    .fc-daygrid-day.day-closed .fc-daygrid-day-frame {
      background: rgba(108, 117, 125, 0.1);
    }
    .fc-daygrid-day.day-open .fc-daygrid-day-number {
      color: #198754;
      font-weight: 700;
    }

    /* Event badges */
    .fc-event-open {
      background-color: #198754 !important;
      border-color: #198754 !important;
    }
    .fc-event-closed {
      background-color: #6c757d !important;
      border-color: #6c757d !important;
    }

    #calendar {
      max-width: 900px;
      margin: 0 auto;
    }

    .legend-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      display: inline-block;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-shop me-2"></i>営業状況
      </a>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
          <i class="bi bi-key me-1"></i>パスワード変更
        </button>
        <a href="schedule.html" class="btn btn-success btn-sm">
          <i class="bi bi-calendar3 me-1"></i>予定管理
        </a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-grow-1 container py-4">
    <h2 class="mb-1 fw-bold"><i class="bi bi-calendar-week me-2"></i>予定管理</h2>
    <p class="text-muted mb-3">日付をクリックして「営業中」か「準備中」を切り替えられます。</p>

    <!-- Legend -->
    <div class="d-flex gap-3 mb-3 align-items-center">
      <span class="d-flex align-items-center gap-1">
        <span class="legend-dot bg-success"></span> 営業中
      </span>
      <span class="d-flex align-items-center gap-1">
        <span class="legend-dot bg-secondary"></span> 準備中（デフォルト）
      </span>
      <button id="btnClearAll" class="btn btn-outline-danger btn-sm ms-auto">
        <i class="bi bi-trash me-1"></i>すべてリセット
      </button>
    </div>

    <!-- Calendar -->
    <div id="calendar"></div>

    <!-- Bulk set modal trigger -->
    <div class="mt-3 d-flex gap-2 flex-wrap">
      <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#bulkModal">
        <i class="bi bi-calendar-plus me-1"></i>まとめて登録
      </button>
    </div>
  </main>

  <!-- Bulk modal -->
  <div class="modal fade" id="bulkModal" tabindex="-1" aria-labelledby="bulkModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="bulkModalLabel">
            <i class="bi bi-calendar-range me-2"></i>まとめて登録
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">開始日</label>
            <input type="date" id="bulkStart" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">終了日</label>
            <input type="date" id="bulkEnd" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">ステータス</label>
            <select id="bulkStatus" class="form-select">
              <option value="open">営業中</option>
              <option value="closed">準備中（削除）</option>
            </select>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="weekdaysOnly" />
            <label class="form-check-label" for="weekdaysOnly">平日のみ（土日を除く）</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-success" id="btnBulkSave" data-bs-dismiss="modal">
            <i class="bi bi-check2 me-1"></i>登録
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Password setup modal (first time) -->
  <div class="modal fade" id="setupPasswordModal" tabindex="-1" aria-labelledby="setupPasswordModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="setupPasswordModalLabel">
            <i class="bi bi-shield-lock me-2"></i>パスワードの初期設定
          </h5>
        </div>
        <div class="modal-body">
          <p class="text-muted small">予定管理ページを保護するパスワードを設定してください。</p>
          <div class="mb-3">
            <label class="form-label fw-semibold">新しいパスワード</label>
            <input type="password" id="setupPassword1" class="form-control" placeholder="パスワードを入力" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">パスワード（確認）</label>
            <input type="password" id="setupPassword2" class="form-control" placeholder="もう一度入力" />
          </div>
          <div id="setupPasswordError" class="text-danger small d-none"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-success" id="btnSetupPasswordSave">
            <i class="bi bi-check2 me-1"></i>設定する
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Password entry modal (every load) -->
  <div class="modal fade" id="enterPasswordModal" tabindex="-1" aria-labelledby="enterPasswordModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="enterPasswordModalLabel">
            <i class="bi bi-lock me-2"></i>パスワードを入力
          </h5>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">パスワード</label>
            <input type="password" id="enterPassword" class="form-control" placeholder="パスワードを入力" />
          </div>
          <div id="enterPasswordError" class="text-danger small d-none"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" id="btnEnterPasswordOk">
            <i class="bi bi-unlock me-1"></i>ログイン
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Password change modal -->
  <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="changePasswordModalLabel">
            <i class="bi bi-key me-2"></i>パスワード変更
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">現在のパスワード</label>
            <input type="password" id="changeCurrentPassword" class="form-control" placeholder="現在のパスワード" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">新しいパスワード</label>
            <input type="password" id="changeNewPassword1" class="form-control" placeholder="新しいパスワード" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">新しいパスワード（確認）</label>
            <input type="password" id="changeNewPassword2" class="form-control" placeholder="もう一度入力" />
          </div>
          <div id="changePasswordError" class="text-danger small d-none"></div>
          <div id="changePasswordSuccess" class="text-success small d-none"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="btnChangePasswordSave">
            <i class="bi bi-check2 me-1"></i>変更する
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="py-3 bg-dark text-white text-center small mt-4">
    <div class="container">
      &copy; <span id="year"></span> yoshida-kd
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    /* ---- password helpers ---- */
    const PW_KEY = 'schedulePasswordHash';

    async function sha256(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function showError(el, msg) {
      el.textContent = msg;
      el.classList.remove('d-none');
    }
    function hideError(el) {
      el.classList.add('d-none');
    }

    /* ---- on page load: show appropriate modal ---- */
    window.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem(PW_KEY);
      if (!stored) {
        new bootstrap.Modal(document.getElementById('setupPasswordModal')).show();
      } else {
        new bootstrap.Modal(document.getElementById('enterPasswordModal')).show();
      }
    });

    /* ---- setup password ---- */
    document.getElementById('btnSetupPasswordSave').addEventListener('click', async () => {
      const p1 = document.getElementById('setupPassword1').value;
      const p2 = document.getElementById('setupPassword2').value;
      const errEl = document.getElementById('setupPasswordError');
      hideError(errEl);
      if (!p1) { showError(errEl, 'パスワードを入力してください。'); return; }
      if (p1 !== p2) { showError(errEl, 'パスワードが一致しません。'); return; }
      localStorage.setItem(PW_KEY, await sha256(p1));
      bootstrap.Modal.getInstance(document.getElementById('setupPasswordModal')).hide();
      document.getElementById('setupPassword1').value = '';
      document.getElementById('setupPassword2').value = '';
    });

    /* ---- enter password ---- */
    async function tryEnterPassword() {
      const val = document.getElementById('enterPassword').value;
      const errEl = document.getElementById('enterPasswordError');
      hideError(errEl);
      if (!val) { showError(errEl, 'パスワードを入力してください。'); return; }
      const hash = await sha256(val);
      if (hash !== localStorage.getItem(PW_KEY)) {
        showError(errEl, 'パスワードが違います。');
        document.getElementById('enterPassword').value = '';
        return;
      }
      bootstrap.Modal.getInstance(document.getElementById('enterPasswordModal')).hide();
      document.getElementById('enterPassword').value = '';
    }

    document.getElementById('btnEnterPasswordOk').addEventListener('click', tryEnterPassword);
    document.getElementById('enterPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryEnterPassword();
    });

    /* ---- change password ---- */
    document.getElementById('btnChangePasswordSave').addEventListener('click', async () => {
      const cur = document.getElementById('changeCurrentPassword').value;
      const n1 = document.getElementById('changeNewPassword1').value;
      const n2 = document.getElementById('changeNewPassword2').value;
      const errEl = document.getElementById('changePasswordError');
      const okEl = document.getElementById('changePasswordSuccess');
      hideError(errEl);
      okEl.classList.add('d-none');
      if (!cur) { showError(errEl, '現在のパスワードを入力してください。'); return; }
      if (await sha256(cur) !== localStorage.getItem(PW_KEY)) {
        showError(errEl, '現在のパスワードが違います。');
        document.getElementById('changeCurrentPassword').value = '';
        return;
      }
      if (!n1) { showError(errEl, '新しいパスワードを入力してください。'); return; }
      if (n1 !== n2) { showError(errEl, '新しいパスワードが一致しません。'); return; }
      localStorage.setItem(PW_KEY, await sha256(n1));
      document.getElementById('changeCurrentPassword').value = '';
      document.getElementById('changeNewPassword1').value = '';
      document.getElementById('changeNewPassword2').value = '';
      okEl.textContent = 'パスワードを変更しました。';
      okEl.classList.remove('d-none');
    });

    /* ---- storage helpers ---- */
    function getSchedule() {
      try { return JSON.parse(localStorage.getItem('schedule') || '{}'); }
      catch { return {}; }
    }
    function saveSchedule(s) {
      localStorage.setItem('schedule', JSON.stringify(s));
    }

    /* ---- build FullCalendar events from schedule ---- */
    function buildEvents(schedule) {
      return Object.entries(schedule)
        .filter(([, v]) => v === 'open')
        .map(([date]) => ({
          id: date,
          title: '営業中',
          start: date,
          allDay: true,
          classNames: ['fc-event-open'],
        }));
    }

    /* ---- calendar ---- */
    const calEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calEl, {
      initialView: 'dayGridMonth',
      locale: 'ja',
      height: 'auto',
      firstDay: 0,
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,listMonth',
      },
      buttonText: { today: '今日', month: '月', list: 'リスト' },
      events: buildEvents(getSchedule()),

      /* Toggle on day click */
      dateClick(info) {
        const schedule = getSchedule();
        const key = info.dateStr;
        if (schedule[key] === 'open') {
          delete schedule[key];
        } else {
          schedule[key] = 'open';
        }
        saveSchedule(schedule);
        refreshCalendar();
      },

      /* Toggle on event click (remove open) */
      eventClick(info) {
        const schedule = getSchedule();
        delete schedule[info.event.id];
        saveSchedule(schedule);
        refreshCalendar();
      },

      /* Color day cells */
      dayCellDidMount(info) {
        const key = info.date.toLocaleDateString('sv-SE');
        const schedule = getSchedule();
        if (schedule[key] === 'open') {
          info.el.classList.add('day-open');
        }
      },
    });
    calendar.render();

    function refreshCalendar() {
      calendar.removeAllEvents();
      calendar.addEventSource(buildEvents(getSchedule()));
    }

    /* ---- clear all ---- */
    document.getElementById('btnClearAll').addEventListener('click', () => {
      if (confirm('すべての予定をリセットしますか？')) {
        saveSchedule({});
        refreshCalendar();
      }
    });

    /* ---- bulk register ---- */
    document.getElementById('btnBulkSave').addEventListener('click', () => {
      const start = document.getElementById('bulkStart').value;
      const end = document.getElementById('bulkEnd').value;
      const status = document.getElementById('bulkStatus').value;
      const weekdaysOnly = document.getElementById('weekdaysOnly').checked;

      if (!start || !end || start > end) {
        alert('正しい日付範囲を入力してください。');
        return;
      }

      const schedule = getSchedule();
      const cur = new Date(start);
      const last = new Date(end);
      while (cur <= last) {
        const dow = cur.getDay();
        if (!weekdaysOnly || (dow !== 0 && dow !== 6)) {
          const key = cur.toLocaleDateString('sv-SE');
          if (status === 'open') {
            schedule[key] = 'open';
          } else {
            delete schedule[key];
          }
        }
        cur.setDate(cur.getDate() + 1);
      }
      saveSchedule(schedule);
      refreshCalendar();
    });
  </script>
</body>
</html>
