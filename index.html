<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>営業状況</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f8f9fa;
    }
    .status-card {
      max-width: 480px;
      width: 100%;
    }
    .status-open {
      background: linear-gradient(135deg, #198754 0%, #20c997 100%);
    }
    .status-closed {
      background: linear-gradient(135deg, #6c757d 0%, #adb5bd 100%);
    }
    .status-icon {
      font-size: 5rem;
    }
    .status-label {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.1em;
    }
    footer {
      margin-top: auto;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-shop me-2"></i>営業状況
      </a>
      <a href="schedule.html" class="btn btn-outline-light btn-sm">
        <i class="bi bi-calendar3 me-1"></i>予定管理
      </a>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="status-card text-center text-white rounded-4 shadow-lg p-5" id="statusCard">
      <div class="status-icon mb-3" id="statusIcon"></div>
      <div class="status-label mb-2" id="statusLabel"></div>
      <p class="mb-0 fs-5" id="statusDate"></p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-3 bg-dark text-white text-center small">
    <div class="container">
      &copy; <span id="year"></span> yoshida-kd
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function getSchedule() {
      try {
        return JSON.parse(localStorage.getItem('schedule') || '{}');
      } catch {
        return {};
      }
    }

    function toDateKey(date) {
      return date.toLocaleDateString('sv-SE'); // YYYY-MM-DD
    }

    const today = new Date();
    const key = toDateKey(today);
    const schedule = getSchedule();
    const isOpen = schedule[key] === 'open';

    const card = document.getElementById('statusCard');
    const icon = document.getElementById('statusIcon');
    const label = document.getElementById('statusLabel');
    const dateEl = document.getElementById('statusDate');

    if (isOpen) {
      card.classList.add('status-open');
      icon.innerHTML = '<i class="bi bi-door-open-fill"></i>';
      label.textContent = '営業中';
    } else {
      card.classList.add('status-closed');
      icon.innerHTML = '<i class="bi bi-door-closed-fill"></i>';
      label.textContent = '準備中';
    }

    dateEl.textContent = today.toLocaleDateString('ja-JP', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });
  </script>
</body>
</html>
